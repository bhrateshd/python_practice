name: Python CI

on:
  pull_request:
    branches:
      - master

jobs:
  syntax-and-code-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install flake8
        run: |
          pip install flake8

      - name: Check Python Syntax
        run: |
          python -m compileall .

      - name: Run Code Quality Check
        run: |
          flake8 .